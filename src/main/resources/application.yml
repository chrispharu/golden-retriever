server:
  port: 3000

spring:
  application:
    name: golden-retriever-java
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=GoldenRetriever;encrypt=true;trustServerCertificate=true
    username: sa
    password: atinfo
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
  main:
    allow-bean-definition-overriding: true

app:
  cache:
    max-age: 300000
    trading-open: 60000
    trading-closed: 3600000
    rates-gold: 300000
    chart: 3600000
    clean-interval: 300000
  api:
    timeout: 5000

logging:
  level:
    root: INFO
    com.example.golden_retriever_java: DEBUG
    org.hibernate.SQL: DEBUG