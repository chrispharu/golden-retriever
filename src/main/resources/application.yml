server:
  port: 3000

spring:
  application:
    name: golden-retriever-java
  # [NEW] MSSQL 連線配置
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=GoldenRetriever;encrypt=true;trustServerCertificate=true
    username: sa
    password: atinfo
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update # 自動維護資料表結構
    show-sql: true # 顯示執行的 SQL
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

app:
  # [MODIFIED] 原因: 將快取參數集中至此，完美取代 Node.js 的 config.js
  cache:
    max-age: 300000
    trading-open: 60000
    trading-closed: 3600000
    rates-gold: 300000
    chart: 3600000
    clean-interval: 300000
  api:
    timeout: 5000

logging:
  level:
    root: INFO
    com.example.golden_retriever_java: DEBUG
    org.hibernate.SQL: DEBUG # 觀察 JPA 行為用